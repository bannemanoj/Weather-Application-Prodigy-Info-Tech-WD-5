<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
overflow:hidden;
}

body{
height:100vh;
background:linear-gradient(180deg,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* CLOUDS */
.cloud{
position:absolute;
top:20%;
width:200px;
opacity:.5;
animation:moveClouds 60s linear infinite;
}
.cloud:nth-child(2){
top:60%;
animation-duration:80s;
}
@keyframes moveClouds{
0%{ transform:translateX(-300px);}
100%{ transform:translateX(120vw);}
}

/* APP */
.weather-card{
width:95%;
height:95vh;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(18px);
border-radius:25px;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

/* SEARCH */
.search{
width:220px;
background:white;
border-radius:20px;
padding:5px 10px;
}
.search input{
border:none;
outline:none;
width:100%;
font-size:11px;
}

/* TOP */
.top{
display:flex;
justify-content:space-between;
align-items:center;
}
.weather-icon{width:70px;}
.temp{font-size:30px;}
.city{font-size:14px;}
.date{font-size:10px;opacity:.8;}

/* DETAILS */
.details{
display:flex;
gap:20px;
margin-top:10px;
}
.col{
display:flex;
align-items:center;
gap:6px;
}
.col img{width:16px;}
.col p{font-size:10px;}

/* HOURLY */
.hourly{
display:flex;
gap:8px;
overflow-x:auto;
}
.hour{
min-width:60px;
background:rgba(255,255,255,0.25);
padding:6px;
border-radius:10px;
text-align:center;
}
.hour img{width:20px;}
.hour p{font-size:10px;}

/* CITIES */
.cities{
display:flex;
gap:10px;
overflow-x:auto;
}
.city-card{
min-width:120px;
background:rgba(255,255,255,0.25);
padding:8px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:11px;
}
.city-card img{width:24px;}
</style>
</head>

<body>

<img src="https://cdn-icons-png.flaticon.com/512/414/414825.png" class="cloud">
<img src="https://cdn-icons-png.flaticon.com/512/414/414825.png" class="cloud">

<div class="weather-card">

<div class="search">
<input type="text" placeholder="Search city">
</div>

<div class="top">
<div>
<h1 class="temp">22°C</h1>
<h2 class="city">Hyderabad</h2>
<p class="date">Sunday</p>

<div class="details">
<div class="col">
<img src="https://cdn-icons-png.flaticon.com/512/4148/4148460.png">
<p>65%</p>
</div>
<div class="col">
<img src="https://cdn-icons-png.flaticon.com/512/553/553416.png">
<p>12 km/h</p>
</div>
</div>
</div>

<img src="https://cdn-icons-png.flaticon.com/512/869/869869.png"
class="weather-icon">
</div>

<!-- HOURLY WEATHER -->
<h3>Hourly Forecast</h3>
<div class="hourly">
<div class="hour"><p>9AM</p><img src="https://cdn-icons-png.flaticon.com/512/869/869869.png"><p>24°</p></div>
<div class="hour"><p>10AM</p><img src="https://cdn-icons-png.flaticon.com/512/414/414825.png"><p>23°</p></div>
<div class="hour"><p>11AM</p><img src="https://cdn-icons-png.flaticon.com/512/1163/1163624.png"><p>22°</p></div>
<div class="hour"><p>12PM</p><img src="https://cdn-icons-png.flaticon.com/512/869/869869.png"><p>25°</p></div>
<div class="hour"><p>1PM</p><img src="https://cdn-icons-png.flaticon.com/512/414/414825.png"><p>26°</p></div>
</div>

<!-- CITIES -->
<h3>Other Cities</h3>
<div class="cities">
<div class="city-card">Delhi 28° <img src="https://cdn-icons-png.flaticon.com/512/869/869869.png"></div>
<div class="city-card">Mumbai 30° <img src="https://cdn-icons-png.flaticon.com/512/414/414825.png"></div>
<div class="city-card">Chennai 31° <img src="https://cdn-icons-png.flaticon.com/512/869/869869.png"></div>
<div class="city-card">Bangalore 24° <img src="https://cdn-icons-png.flaticon.com/512/1163/1163624.png"></div>
</div>

</div>

</body>
</html>
